<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Connect 4</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-container">
    <h1>Connect 4</h1>

    <div id="difficulty">
      <button class="diff-btn active" data-depth="2">Easy</button>
      <button class="diff-btn" data-depth="5">Medium</button>
      <button class="diff-btn" data-depth="7">Hard</button>
    </div>

    <div id="status">Your turn</div>
    <div id="board"></div>
    <button id="reset">New Game</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
