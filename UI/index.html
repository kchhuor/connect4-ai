<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Connect 4</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-container">
    <h1>Connect 4</h1>

    <div id="difficulty">
      <button class="diff-btn active" data-depth="2">Easy</button>
      <button class="diff-btn" data-depth="5">Medium</button>
      <button class="diff-btn" data-depth="7">Hard</button>
      <button id="restartGame" class="ui-btn">Restart Game</button>
    </div>

    <div id="status">Your turn</div>
    <div id="board"></div>
    <div id="stats">
      <p>Depth: <span id="depthStat">2</span></p>
      <p>Last AI Runtime: <span id="runtimeStat">0</span> ms</p>
      <p>Last AI Score: <span id="scoreStat">0</span></p>
      <p>AI Wins: <span id="aiWinsStat">0</span></p>
      <p>Player Wins: <span id="playerWinsStat">0</span></p>
      <p>AI Win Rate: <span id="winRateStat">0%</span></p>
    </div>
    <button id="reset">New Game</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
